<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block admin_title %}Dashboard{% endblock %} — Polka Dot Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; color: #0a0a0a; }
        .admin-header {
            background: #0a0a0a; color: white; padding: 0 32px;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .admin-logo { font-size: 20px; font-weight: 700; letter-spacing: -1px; }
        .admin-logo span { display: inline-block; width: 6px; height: 6px; background: white; border-radius: 50%; margin-left: 2px; vertical-align: super; }
        .admin-nav { display: flex; gap: 24px; }
        .admin-nav a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .admin-nav a:hover, .admin-nav a.active { color: white; }
        .admin-layout { display: flex; margin-top: 60px; min-height: calc(100vh - 60px); }
        .admin-sidebar { width: 240px; background: white; border-right: 1px solid #eee; padding: 24px 0; position: fixed; height: 100%; }
        .admin-sidebar a { display: block; padding: 12px 24px; color: #666; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.3s; }
        .admin-sidebar a:hover, .admin-sidebar a.active { background: #f5f5f5; color: #0a0a0a; }
        .admin-main { margin-left: 240px; padding: 32px; flex: 1; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .admin-stat-card { background: white; padding: 24px; border-radius: 16px; }
        .admin-stat-value { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
        .admin-stat-label { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .admin-stat-card--accent { background: #0a0a0a; color: white; }
        .admin-section { background: white; border-radius: 16px; padding: 24px; }
        .admin-section h2 { font-size: 18px; margin-bottom: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { text-align: left; padding: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; border-bottom: 2px solid #f5f5f5; }
        .admin-table td { padding: 12px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .admin-status { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .admin-status--pending { background: #fff3cd; color: #856404; }
        .admin-status--confirmed { background: #d4edda; color: #155724; }
        .admin-status--paid { background: #cce5ff; color: #004085; }
        .admin-status--cancelled { background: #f8d7da; color: #721c24; }
        .btn { display: inline-flex; padding: 10px 20px; background: #0a0a0a; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #333; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-logo">pd<span></span> Admin</div>
        <nav class="admin-nav">
            <a href="{{ url_for('main.index') }}">На сайт</a>
            <a href="{{ url_for('admin.logout') }}">Выйти</a>
        </nav>
    </header>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="{{ url_for('admin.dashboard') }}" class="{% if request.endpoint == 'admin.dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('admin.admin_products') }}" class="{% if request.endpoint == 'admin.admin_products' %}active{% endif %}">Продукты</a>
            <a href="{{ url_for('admin.admin_preorders') }}" class="{% if request.endpoint == 'admin.admin_preorders' %}active{% endif %}">Предзаказы</a>
            <a href="{{ url_for('admin.admin_announcements') }}" class="{% if request.endpoint == 'admin.admin_announcements' %}active{% endif %}">Анонсы</a>
        </aside>
        <main class="admin-main">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div style="padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; background: {% if category == 'success' %}#d4edda{% else %}#f8d7da{% endif %}; color: {% if category == 'success' %}#155724{% else %}#721c24{% endif %}; font-size: 14px;">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            {% block admin_content %}{% endblock %}
        </main>
    </div>
</body>
</html>
