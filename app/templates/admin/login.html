<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Polka Dot</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a; color: white;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #1a1a1a; padding: 48px; border-radius: 24px;
            width: 100%; max-width: 400px; margin: 20px;
        }
        .login-logo {
            text-align: center; margin-bottom: 32px;
            font-size: 28px; font-weight: 700; letter-spacing: -2px;
        }
        .login-logo span {
            display: inline-block; width: 8px; height: 8px;
            background: white; border-radius: 50%; margin-left: 2px; vertical-align: super;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 12px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; opacity: 0.6;
        }
        .form-group input {
            width: 100%; padding: 14px 18px; background: #2a2a2a;
            border: 2px solid #333; border-radius: 12px; color: white;
            font-size: 15px; font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: white; }
        .btn {
            width: 100%; padding: 16px; background: white; color: #0a0a0a;
            border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .flash { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .flash--error { background: #ff4444; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">pd<span></span> Admin</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash flash--{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>
    </div>
</body>
</html>
